name: vLLM XPU Benchmark

on:
  workflow_dispatch:
    inputs:
      docker_image:
        description: "Full docker image URI (repo:tag)"
        type: string
        required: true
        default: "public.ecr.aws/q9t5s3a7/vllm-ci-test-repo:a1d4d86f23c86275a99e218c28682332dfbc16b4-xpu"

      vllm_repo:
        description: "vLLM git repository URL"
        type: string
        default: "https://github.com/vllm-project/vllm.git"

      vllm_branch:
        description: "vLLM branch to checkout"
        type: string
        default: "main"

      vllm_xpu_kernel_repo:
        description: "vLLM XPU kernel repo URL"
        type: string
        default: "https://github.com/vllm-project/vllm-xpu-kernels.git"

      vllm_xpu_kernel_branch:
        description: "vLLM XPU kernel branch"
        type: string
        default: "main"

      test_case_file:
        description: "Path to test case file (relative to repo root)"
        type: string
        default: ""

      test_case_param:
        description: "Inline test case definitions (use \\n to separate lines)"
        type: string
        default: ""

      extra_args:
        description: "Extra arguments for vLLM server"
        type: string
        default: ""

      extra_ENV:
        description: "Extra environment variables for container"
        type: string
        default: ""

      default_dtype:
        description: "Default data type"
        type: choice
        options:
          - float16
          - bfloat16
        default: "bfloat16"

      log_level:
        description: "Log level"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
        default: "INFO"

      num_warmup:
        description: "Number of warmup iterations"
        type: number
        default: 8

      client_docker_timeout:
        description: "Client docker timeout (seconds)"
        type: number
        default: 1800

      case_repeat:
        description: "Repeat each test case N times"
        type: number
        default: 1

      node_label:
        description: "Runner group label (must be a label registered on at least one self-hosted runner, e.g. B60_group). The actual machine picked is announced by the pick-node job."
        type: choice
        options:
          - B60_group
          - 816792
          - bmg816790
          - gnr816789
        default: "B60_group"

      model_cache:
        description: "Model cache path override (leave empty for auto)"
        type: string
        default: "None"

      build_kernel:
        description: "Build vLLM XPU kernel wheel from source"
        type: boolean
        default: false

      build_image:
        description: "Build vLLM docker image (uses built kernel if build_kernel=true)"
        type: boolean
        default: false

      vllm_xpu_kernel_build_docker:
        description: "Docker image used to build the vLLM XPU kernel wheel"
        type: string
        default: "pytorch/manylinux2_28-builder:xpu-v2.11.0-rc6"

      kernel_whl_url:
        description: "Pre-built kernel wheel URL or local path (skips kernel build during image build)"
        type: string
        default: ""

  # schedule:
  #   - cron: '0 0 * * 1'  # Weekly Monday midnight UTC

jobs:
  # ──────────────────────────────────────────────
  # Pick node: pin all downstream jobs to the same
  # physical runner picked from the node_label group.
  #
  # IMPORTANT: for the pinning to work, every self-hosted runner that may be
  # picked here must register its own hostname as one of its labels (i.e.
  # `./config.sh ... --labels B60_group,<hostname>`). The downstream jobs use
  # `runner.name` (which equals the runner's registration name, typically the
  # hostname) as a label. Without that, build-kernel/build-image/benchmark
  # will hang at "Waiting for a runner to pick up this job...".
  # ──────────────────────────────────────────────
  pick-node:
    runs-on: [self-hosted, "${{ inputs.node_label }}"]
    outputs:
      runner_name: ${{ steps.pick.outputs.runner_name }}
      labels: ${{ steps.pick.outputs.labels }}
    steps:
      - name: Record picked runner
        id: pick
        run: |
          set -euo pipefail
          echo "::group::Picked runner info"
          echo "RUNNER_NAME       : ${RUNNER_NAME}"
          echo "hostname          : $(hostname)"
          echo "hostname -s       : $(hostname -s)"
          echo "node_label input  : ${{ inputs.node_label }}"
          echo "::endgroup::"

          # Downstream jobs runs-on [self-hosted, <RUNNER_NAME>]. This only works
          # if RUNNER_NAME is registered as a custom label on this runner.
          echo "runner_name=${RUNNER_NAME}" >> "$GITHUB_OUTPUT"
          printf 'labels=["self-hosted","%s"]\n' "${RUNNER_NAME}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Build Kernel: build vllm_xpu_kernel wheel
  # ──────────────────────────────────────────────
  build-kernel:
    if: ${{ inputs.build_kernel == true }}
    needs: [pick-node]
    runs-on: ${{ fromJSON(needs.pick-node.outputs.labels) }}
    timeout-minutes: 90
    env:
      KERNEL_REPO: ${{ inputs.vllm_xpu_kernel_repo }}
      KERNEL_BRANCH: ${{ inputs.vllm_xpu_kernel_branch }}
      KERNEL_BUILD_DOCKER: ${{ inputs.vllm_xpu_kernel_build_docker }}
      EXTRA_ENV: ${{ inputs.extra_ENV }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare workspace
        run: |
          sudo chmod -R 777 "$GITHUB_WORKSPACE" || true
          rm -rf "$GITHUB_WORKSPACE/logs" "$GITHUB_WORKSPACE/vllm_xpu_kernel"
          mkdir -p "$GITHUB_WORKSPACE/logs"

      - name: Validate kernel inputs
        run: |
          set -euo pipefail
          if [[ -z "${KERNEL_REPO}" ]]; then
            echo "::error::build_kernel=true requires vllm_xpu_kernel_repo to be set"
            exit 1
          fi

      - name: Clone vllm_xpu_kernel
        run: |
          set -euo pipefail
          set -x
          branch="${KERNEL_BRANCH:-main}"
          git clone --branch "${branch}" --single-branch "${KERNEL_REPO}" vllm_xpu_kernel
          git -C vllm_xpu_kernel log -1 --pretty=format:'kernel commit: %H%n%s'

      - name: Build kernel wheel in docker
        run: |
          set -euo pipefail
          set -x
          exec > >(tee -a "$GITHUB_WORKSPACE/logs/build_kernel.log") 2>&1

          CONTAINER_NAME=build_vllm_xpu_kernel_${GITHUB_RUN_ID}
          cleanup_docker() { docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true; }
          trap cleanup_docker EXIT INT TERM

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

          docker run \
            -u root \
            --name "$CONTAINER_NAME" \
            -v "$GITHUB_WORKSPACE":/workspace \
            --network host --ipc=host \
            --env EXTRA_ENV="${EXTRA_ENV:-}" \
            --privileged \
            "${KERNEL_BUILD_DOCKER}" \
            bash /workspace/scripts/build_vllm_xpu_kernel.sh "${KERNEL_BRANCH:-main}"

          WHL=$(ls "$GITHUB_WORKSPACE"/vllm_xpu_kernel/dist/*.whl | head -n1)
          if [[ -z "${WHL}" ]]; then
            echo "::error::Kernel wheel not found in vllm_xpu_kernel/dist"
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/logs/kernel_dist"
          cp "${WHL}" "$GITHUB_WORKSPACE/logs/kernel_dist/"
          echo "$(basename "${WHL}")" > "$GITHUB_WORKSPACE/logs/kernel_dist/wheel_name.txt"
          echo "[INFO] Kernel wheel: ${WHL}"

      - name: Upload kernel wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: vllm-xpu-kernel-wheel-${{ github.run_number }}
          path: logs/kernel_dist/
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-kernel-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Build Image: build vLLM docker image
  # ──────────────────────────────────────────────
  build-image:
    if: ${{ inputs.build_image == true }}
    needs: [pick-node, build-kernel]
    # build-kernel is optional: allow this job when build-kernel succeeded or was skipped
    # (e.g. when build_kernel=false and a prebuilt kernel_whl_url is provided).
    runs-on: ${{ fromJSON(needs.pick-node.outputs.labels) }}
    timeout-minutes: 120
    env:
      DOCKER_IMAGE: ${{ inputs.docker_image }}
      VLLM_REPO: ${{ inputs.vllm_repo }}
      VLLM_BRANCH: ${{ inputs.vllm_branch }}
      KERNEL_WHL_URL: ${{ inputs.kernel_whl_url }}
      BUILD_KERNEL_RESULT: ${{ needs.build-kernel.result }}
    steps:
      - name: Guard on kernel build result
        run: |
          set -euo pipefail
          # If build_kernel was requested, it must have succeeded.
          if [[ "${{ inputs.build_kernel }}" == "true" && "${BUILD_KERNEL_RESULT}" != "success" ]]; then
            echo "::error::build-kernel did not succeed (result=${BUILD_KERNEL_RESULT}); aborting build-image"
            exit 1
          fi
          # If build_kernel was not requested, we need a pre-built kernel URL/path.
          if [[ "${{ inputs.build_kernel }}" != "true" && -z "${KERNEL_WHL_URL}" ]]; then
            echo "::error::build_kernel=false and kernel_whl_url is empty; cannot resolve kernel wheel"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare workspace
        run: |
          sudo chmod -R 777 "$GITHUB_WORKSPACE" || true
          rm -rf "$GITHUB_WORKSPACE/logs" "$GITHUB_WORKSPACE/vllm"
          mkdir -p "$GITHUB_WORKSPACE/logs"

      - name: Download kernel wheel artifact
        if: ${{ inputs.build_kernel == true }}
        uses: actions/download-artifact@v4
        with:
          name: vllm-xpu-kernel-wheel-${{ github.run_number }}
          path: logs/kernel_dist

      - name: Clone vllm repo
        run: |
          set -euo pipefail
          set -x
          if [[ -d vllm/.git ]]; then
            git -C vllm fetch --all --prune
          else
            rm -rf vllm
            git clone "${VLLM_REPO}" vllm
          fi
          git -C vllm checkout "${VLLM_BRANCH}"

      - name: Build docker image
        run: |
          set -euo pipefail
          set -x
          exec > >(tee -a "$GITHUB_WORKSPACE/logs/build_image.log") 2>&1

          # Resolve kernel wheel reference for requirements/xpu.txt
          if [[ "${{ inputs.build_kernel }}" == "true" ]]; then
            WHL_FILE=$(ls "$GITHUB_WORKSPACE"/logs/kernel_dist/*.whl | head -n1)
            if [[ -z "${WHL_FILE}" ]]; then
              echo "::error::No kernel wheel found in logs/kernel_dist"
              exit 1
            fi
            # Copy wheel into docker build context and reference relative path.
            mkdir -p "$GITHUB_WORKSPACE/vllm/kernel_dist"
            cp "${WHL_FILE}" "$GITHUB_WORKSPACE/vllm/kernel_dist/"
            KERNEL_REF="./kernel_dist/$(basename "${WHL_FILE}")"
          else
            KERNEL_REF="${KERNEL_WHL_URL}"
          fi
          echo "[INFO] Using kernel reference: ${KERNEL_REF}"

          cd "$GITHUB_WORKSPACE/vllm"
          if [[ -f requirements/xpu.txt ]]; then
            sed -i "s|^[[:space:]#]*vllm_xpu_kernels.*|vllm_xpu_kernels @ ${KERNEL_REF}|g" requirements/xpu.txt
          fi

          docker build \
            --build-arg http_proxy="${http_proxy:-}" \
            --build-arg https_proxy="${https_proxy:-}" \
            --build-arg HTTP_PROXY="${http_proxy:-}" \
            --build-arg HTTPS_PROXY="${https_proxy:-}" \
            -f docker/Dockerfile.xpu \
            -t "${DOCKER_IMAGE}" \
            --shm-size=4g \
            .

          docker image inspect "${DOCKER_IMAGE}" >/dev/null
          echo "[INFO] Built image: ${DOCKER_IMAGE}"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-image-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Main: Benchmark
  # ──────────────────────────────────────────────
  benchmark:
    needs: [pick-node, build-kernel, build-image]
    if: |
      always() &&
      needs.pick-node.result == 'success' &&
      (needs.build-kernel.result == 'success' || needs.build-kernel.result == 'skipped') &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ${{ fromJSON(needs.pick-node.outputs.labels) }}
    timeout-minutes: 1440

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      # ── Cleanup previous runs ──
      - name: Cleanup workspace
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE || true
          rm -rf $GITHUB_WORKSPACE/logs/*
          mkdir -p $GITHUB_WORKSPACE/logs

      # ── Clone vLLM & kernel repos ──
      - name: Clone vLLM and kernel repositories
        env:
          VLLM_REPO: ${{ inputs.vllm_repo }}
          VLLM_BRANCH: ${{ inputs.vllm_branch }}
          KERNEL_REPO: ${{ inputs.vllm_xpu_kernel_repo }}
          KERNEL_BRANCH: ${{ inputs.vllm_xpu_kernel_branch }}
          TEST_CASE_FILE: ${{ inputs.test_case_file }}
          TEST_CASE_PARAM: ${{ inputs.test_case_param }}
        run: |
          set -euo pipefail
          set -x

          # Resolve test case file to determine if we need vllm repo
          resolved_case_file="${TEST_CASE_FILE}"
          if [[ -n "${TEST_CASE_PARAM}" ]]; then
            printf '%s\n' "${TEST_CASE_PARAM}" | sed 's/\\n/\n/g' | tr -d '\r' > "${GITHUB_WORKSPACE}/case_list.txt"
            resolved_case_file="${GITHUB_WORKSPACE}/case_list.txt"
          fi

          kernel_repo="${KERNEL_REPO}"
          kernel_branch="${KERNEL_BRANCH:-main}"
          needs_vllm_repo=1

          # Check if only kernel UT cases - skip vllm clone if so
          if [[ -n "${resolved_case_file}" ]] && [[ -f "${resolved_case_file}" ]] && grep -q "run_vllm_xpu_kernel_ut.sh" "${resolved_case_file}"; then
            if [[ -z "${kernel_repo}" ]]; then
              kernel_repo="https://github.com/vllm-project/vllm.git"
              kernel_branch="main"
            fi
            if ! grep -Ev '^[[:space:]]*($|#)|run_vllm_xpu_kernel_ut[.]sh' "${resolved_case_file}" >/dev/null; then
              needs_vllm_repo=0
            fi
          fi

          # Clone vllm
          if [[ "${needs_vllm_repo}" == "1" ]]; then
            if [[ -d vllm/.git ]]; then
              git -C vllm fetch --all --prune
            else
              rm -rf vllm
              git clone "${VLLM_REPO}" vllm
            fi
            git -C vllm checkout "${VLLM_BRANCH}"
          fi

          # Clone kernel repo if specified
          if [[ -n "${kernel_repo}" ]]; then
            rm -rf vllm_xpu_kernel
            git clone --branch "${kernel_branch}" --single-branch "${kernel_repo}" vllm_xpu_kernel
          fi

      # ── Resolve test case file ──
      - name: Resolve test case file
        id: resolve_cases
        env:
          TEST_CASE_FILE: ${{ inputs.test_case_file }}
          TEST_CASE_PARAM: ${{ inputs.test_case_param }}
        run: |
          set -euo pipefail

          if [[ -n "${TEST_CASE_PARAM}" ]]; then
            printf '%s\n' "${TEST_CASE_PARAM}" | sed 's/\\n/\n/g' | tr -d '\r' > "${GITHUB_WORKSPACE}/case_list.txt"
            resolved="${GITHUB_WORKSPACE}/case_list.txt"
            echo "Using inline test_case_param"
          elif [[ -n "${TEST_CASE_FILE}" ]]; then
            resolved="${GITHUB_WORKSPACE}/${TEST_CASE_FILE}"
            echo "Using test_case_file: ${resolved}"
          else
            echo "::error::No test cases specified. Provide test_case_file or test_case_param."
            exit 1
          fi

          if [[ ! -f "${resolved}" ]]; then
            echo "::error::Test case file not found: ${resolved}"
            exit 1
          fi

          echo "Resolved case file contents:"
          cat "${resolved}"
          echo "resolved_case_file=${resolved}" >> "$GITHUB_OUTPUT"

          # Save a copy in logs
          mkdir -p ${GITHUB_WORKSPACE}/logs/TEST_CASES
          cp "${resolved}" ${GITHUB_WORKSPACE}/logs/TEST_CASES/ || true

      # ── Pull docker image (skip pull when image was just built locally) ──
      - name: Pull docker image
        env:
          DOCKER_IMAGE: ${{ inputs.docker_image }}
          IMAGE_BUILT_LOCALLY: ${{ inputs.build_image }}
        run: |
          set -euo pipefail
          if docker image inspect "${DOCKER_IMAGE}" > /dev/null 2>&1; then
            echo "Image already exists locally: ${DOCKER_IMAGE}"
          elif [[ "${IMAGE_BUILT_LOCALLY}" == "true" ]]; then
            echo "::error::build_image=true but image ${DOCKER_IMAGE} not present on runner"
            exit 1
          else
            echo "Pulling image: ${DOCKER_IMAGE}"
            docker pull "${DOCKER_IMAGE}"
          fi

      # ── Install host dependencies ──
      - name: Install host dependencies
        run: |
          set -euo pipefail
          . ~/miniforge3/bin/activate || true

          # apt packages
          missing_apt=()
          for pkg in libpq-dev python3-dev build-essential; do
            dpkg -s "$pkg" &>/dev/null || missing_apt+=("$pkg")
          done
          if [[ ${#missing_apt[@]} -gt 0 ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y "${missing_apt[@]}"
          fi

          # pip packages
          missing_pip=()
          for pkg in pandas sqlalchemy docker GitPython psycopg json5; do
            pip show "$pkg" &>/dev/null || missing_pip+=("$pkg")
          done
          if [[ ${#missing_pip[@]} -gt 0 ]]; then
            install_list=("${missing_pip[@]/psycopg/psycopg[binary]}")
            pip install "${install_list[@]}" || true
          fi

      # ── Collect Docker image info (collect_env + pip list) ──
      - name: Collect docker image info
        id: docker_info
        continue-on-error: true
        env:
          DOCKER_IMAGE: ${{ inputs.docker_image }}
          NODE_LABEL: ${{ inputs.node_label }}
        run: |
          set -euo pipefail
          . ~/miniforge3/bin/activate || true

          DOCKER_REPO="${DOCKER_IMAGE%:*}"
          DOCKER_TAG="${DOCKER_IMAGE##*:}"

          python scripts/upload_docker_info.py \
            --skip-db \
            --docker-repo "${DOCKER_REPO}" \
            --docker-tag "${DOCKER_TAG}" \
            --workspace-path "${GITHUB_WORKSPACE}" \
            --node-label "${NODE_LABEL}" \
            2>&1 | tee "${GITHUB_WORKSPACE}/logs/collect_docker_info.log"

      # ── Run benchmark ──
      - name: Run benchmark
        env:
          DOCKER_IMAGE: ${{ inputs.docker_image }}
          VLLM_BRANCH: ${{ inputs.vllm_branch }}
          EXTRA_ARGS: ${{ inputs.extra_args }}
          EXTRA_ENV: ${{ inputs.extra_ENV }}
          DEFAULT_DTYPE: ${{ inputs.default_dtype }}
          LOG_LEVEL: ${{ inputs.log_level }}
          NUM_WARMUP: ${{ inputs.num_warmup }}
          CLIENT_DOCKER_TIMEOUT: ${{ inputs.client_docker_timeout }}
          CASE_REPEAT: ${{ inputs.case_repeat }}
          NODE_LABEL: ${{ inputs.node_label }}
          MODEL_CACHE: ${{ inputs.model_cache }}
          KERNEL_REPO: ${{ inputs.vllm_xpu_kernel_repo }}
          KERNEL_BRANCH: ${{ inputs.vllm_xpu_kernel_branch }}
          RESOLVED_CASE_FILE: ${{ steps.resolve_cases.outputs.resolved_case_file }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CI_BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          . ~/miniforge3/bin/activate || true

          # Split docker_image into repo and tag
          DOCKER_REPO="${DOCKER_IMAGE%:*}"
          DOCKER_TAG="${DOCKER_IMAGE##*:}"

          # Build kernel parameters
          KERNEL_PARAMS=""
          if [[ -n "${KERNEL_REPO}" ]]; then
            KERNEL_PARAMS="${KERNEL_PARAMS} --vllm-xpu-kernel-repo ${KERNEL_REPO}"
          fi
          if [[ -n "${KERNEL_BRANCH}" ]]; then
            KERNEL_PARAMS="${KERNEL_PARAMS} --vllm-xpu-kernel-branch ${KERNEL_BRANCH}"
          fi

          # Build MODEL-CACHE parameter
          MODEL_CACHE_PARAM=""
          if [[ -n "${MODEL_CACHE}" ]]; then
            MODEL_CACHE_PARAM="--MODEL-CACHE ${MODEL_CACHE}"
          fi

          # Build HF-TOKEN parameter
          HF_TOKEN_PARAM=""
          if [[ -n "${HF_TOKEN:-}" ]]; then
            HF_TOKEN_PARAM="--HF-TOKEN ${HF_TOKEN}"
          fi

          echo "========================================="
          echo "Docker image: ${DOCKER_IMAGE}"
          echo "Test cases:   ${RESOLVED_CASE_FILE}"
          echo "vLLM branch:  ${VLLM_BRANCH}"
          echo "Node label:   ${NODE_LABEL}"
          echo "========================================="

          python vllm_test_framework/main.py \
            --skip-db \
            --cases-file-path "${RESOLVED_CASE_FILE}" \
            --docker-repo "${DOCKER_REPO}" \
            --docker-tag "${DOCKER_TAG}" \
            --node-label "${NODE_LABEL}" \
            --workspace-path "${GITHUB_WORKSPACE}" \
            --jenkins-build-url "${CI_BUILD_URL}" \
            ${HF_TOKEN_PARAM} \
            ${MODEL_CACHE_PARAM} \
            --vllm-branch "${VLLM_BRANCH}" \
            --extra-args "${EXTRA_ARGS}" \
            --extra-ENV "${EXTRA_ENV}" \
            --log-level "${LOG_LEVEL}" \
            --default-dtype "${DEFAULT_DTYPE}" \
            --profile 0 \
            --num-warmup "${NUM_WARMUP}" \
            --client-docker-timeout "${CLIENT_DOCKER_TIMEOUT}" \
            --case-repeat "${CASE_REPEAT}" \
            ${KERNEL_PARAMS} \
            2>&1 | tee ${GITHUB_WORKSPACE}/logs/benchmark.log

      # ── Generate Job Summary ──
      - name: Generate job summary
        if: always()
        run: |
          set -euo pipefail

          BENCHMARK_LOG="${GITHUB_WORKSPACE}/logs/benchmark.log"

          {
            echo "## vLLM XPU Benchmark Results"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Docker image | \`${{ inputs.docker_image }}\` |"
            echo "| vLLM branch | \`${{ inputs.vllm_branch }}\` |"
            echo "| Node label | \`${{ inputs.node_label }}\` |"
            echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Docker image info (collect_env + pip list) ──
          DOCKER_INFO_DIR="${GITHUB_WORKSPACE}/collect_docker_info/logs/docker_info"
          COLLECT_ENV_FILE="${DOCKER_INFO_DIR}/collect_env.info"
          PIP_LIST_FILE="${DOCKER_INFO_DIR}/pip_list.json"

          {
            echo "## Docker Image Info"
            echo ""
            echo "**Image:** \`${{ inputs.docker_image }}\`"
            echo ""

            if [[ -f "${COLLECT_ENV_FILE}" ]]; then
              echo "<details><summary>collect_env.py output</summary>"
              echo ""
              echo "\`\`\`"
              # Cap at ~500 lines to stay within summary size limits
              head -n 500 "${COLLECT_ENV_FILE}"
              echo "\`\`\`"
              echo ""
              echo "</details>"
              echo ""
            else
              echo "_collect_env.info not found (collection step may have failed)._"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -f "${PIP_LIST_FILE}" ]]; then
            python3 - "${PIP_LIST_FILE}" >> "$GITHUB_STEP_SUMMARY" <<'PIPEOF'
          import json, sys
          path = sys.argv[1]
          try:
              with open(path) as f:
                  pkgs = json.load(f)
          except Exception as e:
              print(f"_Failed to parse pip_list.json: {e}_\n")
              sys.exit(0)

          pkgs = sorted(pkgs, key=lambda p: p.get("name", "").lower())
          print(f"<details><summary>pip list ({len(pkgs)} packages)</summary>\n")
          print("| Package | Version |")
          print("| --- | --- |")
          for p in pkgs:
              name = str(p.get("name", "")).replace("|", "\\|")
              ver = str(p.get("version", "")).replace("|", "\\|")
              print(f"| `{name}` | `{ver}` |")
          print("\n</details>\n")
          PIPEOF
          else
            echo "_pip_list.json not found._" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          # The Python block parses logs/summary_performance_NEW.log, tails per-case
          # server/client logs for the most relevant error line, and scans
          # logs/benchmark.log for launcher-level failures. All output goes to the
          # GitHub job summary. Heredoc is single-quoted so $... is not expanded.
          python3 - "${GITHUB_WORKSPACE}" >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import sys, os, csv, re, glob

          workspace = sys.argv[1]
          logs_dir = os.path.join(workspace, "logs")
          summary_path = os.path.join(logs_dir, "summary_performance_NEW.log")
          bench_log = os.path.join(logs_dir, "benchmark.log")

          DISPLAY_COLS = [
              ("modelid",          "Model"),
              ("dtype",            "Dtype"),
              ("Parallel",         "Parallel"),
              ("input/output",     "In/Out"),
              ("num_prompts",      "Prompts"),
              ("request_rate",     "Req/s"),
              ("token_throughput", "Throughput"),
              ("TTFT",             "TTFT(s)"),
              ("TPOT",             "TPOT(s)"),
              ("P99_TTFT",         "P99_TTFT"),
              ("P99_TPOT",         "P99_TPOT"),
          ]

          # (short_tag, pattern). First match wins. Order matters: most specific first.
          TAG_PATTERNS = [
              ("OOM",          re.compile(r"UR_RESULT_ERROR_OUT_OF_DEVICE_MEMORY|CUDA out of memory|XPU out of memory|OutOfMemoryError|\bout of memory\b", re.I)),
              ("DEVICE_LOST",  re.compile(r"UR_RESULT_ERROR_DEVICE_LOST|device lost", re.I)),
              ("RPC_DIED",     re.compile(r"RPCServer process died", re.I)),
              ("ENGINE_FAILED",re.compile(r"Engine process failed to start|RuntimeError:\s*Engine", re.I)),
              ("SEGFAULT",     re.compile(r"Segmentation fault|Fatal Python error: Segmentation", re.I)),
              ("INIT_FAIL",    re.compile(r"ValueError:\s*Initial test run failed", re.I)),
              ("CONN_REFUSED", re.compile(r"ConnectionRefusedError|Connection refused", re.I)),
              ("TIMEOUT",      re.compile(r"asyncio\.TimeoutError|\bTimeoutError\b|\btimed out\b|\btimeout\b", re.I)),
              ("ACC_FAIL",     re.compile(r"ACC_FAILED", re.I)),
          ]
          LAUNCHER_RE = re.compile(r"\b(ERROR|Server container is not running|Traceback|docker\.errors|Cannot connect to the Docker daemon)\b")
          # Scrub obvious secrets from any line we surface in the summary.
          SCRUB_RE = re.compile(r"(HF_TOKEN|hf_token|api[_-]?key|--api-key)([=:\s]+)(\S+)", re.I)

          MAX_DETAIL_BLOCKS = 20
          MAX_LOG_LINES = 50
          MAX_LINE_LEN = 300
          MAX_TOTAL_CHARS = 700_000  # GitHub step-summary limit is 1 MB

          out_lines = []
          char_count = [0]

          def emit(line=""):
              s = str(line)
              out_lines.append(s)
              char_count[0] += len(s) + 1

          def md_escape(v):
              if v is None:
                  return ""
              s = str(v).strip()
              s = s.replace("|", "\\|").replace("\n", " ").replace("\r", " ")
              if len(s) > 80:
                  s = s[:77] + "..."
              return s

          def scrub(line):
              return SCRUB_RE.sub(lambda m: f"{m.group(1)}{m.group(2)}***", line)

          def classify(text):
              if not text:
                  return None
              for tag, pat in TAG_PATTERNS:
                  if pat.search(text):
                      return tag
              return None

          def resolve_log_path(name):
              """Map a basename (possibly a URL) to a real file under logs/."""
              if not name:
                  return None
              base = os.path.basename(name.strip())
              if not base or base in ("None", "null", ""):
                  return None
              p = os.path.join(logs_dir, base)
              return p if os.path.isfile(p) else None

          def tail_file(path, max_lines=MAX_LOG_LINES):
              if not path or not os.path.isfile(path):
                  return []
              try:
                  with open(path, "r", errors="replace") as f:
                      data = f.readlines()
              except Exception as e:
                  return [f"<<unable to read log: {e}>>"]
              out = []
              for ln in data[-max_lines:]:
                  ln = ln.rstrip("\n")
                  if len(ln) > MAX_LINE_LEN:
                      ln = ln[:MAX_LINE_LEN] + " ...[trunc]"
                  out.append(scrub(ln))
              return out

          def first_error_line(path):
              """Return the first line in `path` matching any known error pattern."""
              if not path or not os.path.isfile(path):
                  return None
              try:
                  with open(path, "r", errors="replace") as f:
                      for ln in f:
                          if classify(ln):
                              ln = ln.rstrip("\n")
                              if len(ln) > MAX_LINE_LEN:
                                  ln = ln[:MAX_LINE_LEN] + " ...[trunc]"
                              return scrub(ln)
              except Exception:
                  return None
              return None

          def parse_failure_row(row):
              """Detect a server-failure summary row and return (msg, case_id, server_log_basename).

              Schemas written by result_collector.write_summary_log on server failure:
                non-accuracy (10 cols): modelid;script;dtype;dataset;parallel_type;length;num_prompt;case_id;server_error;server_url
                accuracy     ( 9 cols): modelid;script;dtype;dataset;parallel_type;length;case_id;server_error;server_url
              """
              if len(row) == 10:
                  return row[8], row[7], row[9]
              if len(row) == 9:
                  return row[7], row[6], row[8]
              return None, None, None

          # ────────────────────────────────────────────────────────────────
          # Parse summary file
          # ────────────────────────────────────────────────────────────────
          failures = []           # list of dicts {tag, model, case_id, msg, server_log, client_log}
          seen_server_logs = set()
          total = ok = failed = 0

          if not os.path.isfile(summary_path):
              emit("*No performance summary file found.*")
              emit("")
          else:
              with open(summary_path, newline="") as f:
                  rows = list(csv.reader(f, delimiter=";", quotechar='"'))

              header = [h.strip() for h in (rows[0] if rows else [])]
              # Heuristic: treat first row as header only if it contains at least one known column name.
              known = {c[0] for c in DISPLAY_COLS} | {"server_log", "client_log", "case_id"}
              has_header = any(h in known for h in header)
              if has_header:
                  data_rows = rows[1:]
                  idx = {name: header.index(name) for name in known if name in header}
              else:
                  data_rows = rows
                  idx = {}

              emit("### Performance Summary")
              emit("")
              emit("| " + " | ".join(label for _, label in DISPLAY_COLS) + " | Status |")
              emit("|" + " --- |" * (len(DISPLAY_COLS) + 1))

              for row in data_rows:
                  if not row or not any(c.strip() for c in row):
                      continue
                  total += 1

                  srv_err, case_id, srv_log_ref = parse_failure_row(row)
                  is_server_fail = bool(srv_err) and ("error" in srv_err.lower() or "fail" in srv_err.lower() or "not executed" in srv_err.lower())
                  is_short = (not is_server_fail) and bool(header) and len(row) < len(header) - 2

                  # Track server log basenames so we can later spot orphans.
                  for cell in row:
                      c = (cell or "").strip()
                      if c.endswith(".log") and os.path.basename(c).startswith("server_"):
                          seen_server_logs.add(os.path.basename(c))

                  cells = []
                  for key, _ in DISPLAY_COLS:
                      i = idx.get(key)
                      if (is_short or is_server_fail) and key in ("request_rate", "token_throughput", "TTFT", "TPOT", "P99_TTFT", "P99_TPOT"):
                          cells.append("")
                      else:
                          cells.append(md_escape(row[i]) if i is not None and i < len(row) else "")

                  if is_server_fail:
                      srv_log_path = resolve_log_path(srv_log_ref)
                      tag = classify(srv_err) or classify(first_error_line(srv_log_path) or "") or "SERVER_FAIL"
                      status = tag
                      failed += 1
                      failures.append({
                          "tag": tag, "model": row[0] if row else "",
                          "case_id": case_id or "",
                          "msg": (srv_err or "").strip(),
                          "server_log": srv_log_path,
                          "client_log": None,
                      })
                  elif is_short:
                      status = "FAIL"
                      failed += 1
                      failures.append({
                          "tag": "FAIL", "model": row[0] if row else "",
                          "case_id": "", "msg": "",
                          "server_log": None, "client_log": None,
                      })
                  else:
                      tp_i = idx.get("token_throughput")
                      tp_val = row[tp_i].strip() if tp_i is not None and tp_i < len(row) else ""
                      try:
                          float(tp_val)
                          status = "PASS"
                          ok += 1
                      except (ValueError, TypeError):
                          srv_ref = row[idx["server_log"]] if "server_log" in idx and idx["server_log"] < len(row) else ""
                          cli_ref = row[idx["client_log"]] if "client_log" in idx and idx["client_log"] < len(row) else ""
                          srv_path = resolve_log_path(srv_ref)
                          cli_path = resolve_log_path(cli_ref)
                          err = first_error_line(srv_path) or first_error_line(cli_path)
                          tag = classify(err or "") or "FAIL"
                          status = tag
                          failed += 1
                          ci = idx.get("case_id")
                          failures.append({
                              "tag": tag, "model": row[0] if row else "",
                              "case_id": row[ci] if ci is not None and ci < len(row) else "",
                              "msg": err or "",
                              "server_log": srv_path, "client_log": cli_path,
                          })

                  emit("| " + " | ".join(cells) + f" | {status} |")

              emit("")
              emit(f"**Total:** {total} &nbsp;&nbsp; **Pass:** {ok} &nbsp;&nbsp; **Fail:** {failed}")
              emit("")

          # ────────────────────────────────────────────────────────────────
          # Orphan log scan: server_*.log on disk that has no summary row
          # ────────────────────────────────────────────────────────────────
          orphans = []
          if os.path.isdir(logs_dir):
              for srv_path in sorted(glob.glob(os.path.join(logs_dir, "server_*.log"))):
                  base = os.path.basename(srv_path)
                  if base in seen_server_logs:
                      continue
                  cli_base = base[len("server_"):]
                  cli_path = resolve_log_path(cli_base)
                  model = cli_base.split("_")[0]
                  err = first_error_line(srv_path) or first_error_line(cli_path)
                  tag = classify(err or "") or "NO_SUMMARY"
                  orphans.append({
                      "tag": tag, "model": model,
                      "case_id": base, "msg": err or "",
                      "server_log": srv_path, "client_log": cli_path,
                  })

          if orphans:
              emit("### Orphan Cases (no summary row)")
              emit("")
              emit("| Model | Server log | Status |")
              emit("| --- | --- | --- |")
              for o in orphans:
                  emit(f"| {md_escape(o['model'])} | `{md_escape(o['case_id'])}` | {o['tag']} |")
              emit("")
              failures.extend(orphans)
              failed += len(orphans)
              total += len(orphans)
              emit(f"_Updated totals — Total: {total} · Pass: {ok} · Fail: {failed}_")
              emit("")

          # ────────────────────────────────────────────────────────────────
          # Per-case failure detail blocks
          # ────────────────────────────────────────────────────────────────
          if failures:
              emit("### Failed Case Details")
              emit("")
              shown = 0
              for fobj in failures:
                  if shown >= MAX_DETAIL_BLOCKS:
                      emit(f"_... {len(failures) - shown} more failed case(s) omitted; see uploaded artifact._")
                      emit("")
                      break
                  if char_count[0] > MAX_TOTAL_CHARS:
                      emit("_... truncated to keep job summary under size limit; see uploaded artifact._")
                      emit("")
                      break
                  title = " · ".join(x for x in (fobj["tag"], fobj.get("model", ""), fobj.get("case_id", "")) if x)
                  emit(f"<details><summary>FAIL · {title}</summary>")
                  emit("")
                  if fobj.get("msg"):
                      emit(f"**Error:** `{scrub(fobj['msg'])[:300]}`")
                      emit("")
                  for label, path in (("Server log", fobj.get("server_log")),
                                       ("Client log", fobj.get("client_log"))):
                      if not path:
                          continue
                      emit(f"**{label}:** `{os.path.basename(path)}` (last {MAX_LOG_LINES} lines)")
                      emit("")
                      emit("```")
                      for ln in tail_file(path):
                          emit(ln)
                      emit("```")
                      emit("")
                  emit("</details>")
                  emit("")
                  shown += 1

          # ────────────────────────────────────────────────────────────────
          # Launcher-level errors from benchmark.log
          # ────────────────────────────────────────────────────────────────
          if os.path.isfile(bench_log):
              hits = []
              try:
                  with open(bench_log, "r", errors="replace") as f:
                      for ln in f:
                          if LAUNCHER_RE.search(ln):
                              ln = ln.rstrip("\n")
                              if len(ln) > MAX_LINE_LEN:
                                  ln = ln[:MAX_LINE_LEN] + " ...[trunc]"
                              hits.append(scrub(ln))
                              if len(hits) >= 20:
                                  break
              except Exception:
                  pass
              if hits:
                  emit("### Launcher Errors")
                  emit("")
                  emit("<details><summary>First 20 launcher error lines from benchmark.log</summary>")
                  emit("")
                  emit("```")
                  for ln in hits:
                      emit(ln)
                  emit("```")
                  emit("</details>")
                  emit("")

              # Always include a tail of benchmark.log as a last-resort context block
              emit("<details><summary>Benchmark log (last 50 lines)</summary>")
              emit("")
              emit("```")
              for ln in tail_file(bench_log, MAX_LOG_LINES):
                  emit(ln)
              emit("```")
              emit("</details>")
              emit("")

          emit("_Full logs (server/client commands, per-case logs, raw summary) are available in the uploaded artifact._")

          sys.stdout.write("\n".join(out_lines) + "\n")
          PYEOF

      # ── Upload artifacts ──
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
